name: Build and Deploy Front + Back to Azure

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_IMAGE_BACK: noemiedevia/mimiback
  DOCKERHUB_IMAGE_FRONT: noemiedevia/mimifront

jobs:
  build-and-deploy-back:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push back image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE_BACK }}:latest
            ${{ env.DOCKERHUB_IMAGE_BACK }}:${{ github.sha }}

      - name: Deploy back to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: MimiBack
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACK }}
          images: ${{ env.DOCKERHUB_IMAGE_BACK }}:${{ github.sha }}

  build-and-deploy-front:
    runs-on: ubuntu-latest
    needs: build-and-deploy-back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push front image
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ env.DOCKERHUB_IMAGE_FRONT }}:latest
            ${{ env.DOCKERHUB_IMAGE_FRONT }}:${{ github.sha }}

      - name: Deploy front to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: MimiFront
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONT }}
          images: ${{ env.DOCKERHUB_IMAGE_FRONT }}:${{ github.sha }}